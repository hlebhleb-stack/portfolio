name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint Code
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

  build:
    name: Build Check
    runs-on: ubuntu-latest
    needs: lint
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build production bundle
        run: npm run build

      - name: Report bundle size
        run: |
          echo "## Bundle Size Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          du -sh dist/assets/* >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          TOTAL=$(du -sh dist | cut -f1)
          echo "**Total dist size:** $TOTAL" >> $GITHUB_STEP_SUMMARY

  optimize-images:
    name: Optimize Images
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    permissions:
      contents: write
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Optimize PNG and JPG images
        run: |
          node -e "
          const sharp = require('sharp');
          const fs = require('fs');
          const path = require('path');

          const ASSETS = 'public/assets';
          let optimized = 0;

          function walkDir(dir) {
            const entries = fs.readdirSync(dir, { withFileTypes: true });
            let files = [];
            for (const entry of entries) {
              const full = path.join(dir, entry.name);
              if (entry.isDirectory()) files.push(...walkDir(full));
              else files.push(full);
            }
            return files;
          }

          async function run() {
            const files = walkDir(ASSETS);
            for (const file of files) {
              const ext = path.extname(file).toLowerCase();
              if (ext === '.png') {
                const before = fs.statSync(file).size;
                const buf = await sharp(file).png({ quality: 85, compressionLevel: 9 }).toBuffer();
                if (buf.length < before) {
                  fs.writeFileSync(file, buf);
                  const saved = ((1 - buf.length / before) * 100).toFixed(1);
                  console.log('Optimized ' + file + ' — saved ' + saved + '%');
                  optimized++;
                }
              } else if (ext === '.jpg' || ext === '.jpeg') {
                const before = fs.statSync(file).size;
                const buf = await sharp(file).jpeg({ quality: 85 }).toBuffer();
                if (buf.length < before) {
                  fs.writeFileSync(file, buf);
                  const saved = ((1 - buf.length / before) * 100).toFixed(1);
                  console.log('Optimized ' + file + ' — saved ' + saved + '%');
                  optimized++;
                }
              }
            }
            console.log('Total optimized: ' + optimized + ' files');
          }
          run();
          "

      - name: Commit optimized images
        run: |
          cd ..
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "ci: optimize images [skip ci]"
          git push || true
